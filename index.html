<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Académico - Hector Aliaga</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}

body{
    background:#020617;
    color:#e2e8f0;
    transition: background 0.5s ease, color 0.5s ease;
    overflow-x: hidden;
    min-height: 100vh;
}

#bg{ position:fixed; width:100%; height:100%; z-index:-1; top:0; left:0;}

/* 🎨 FONDOS PASTEL */
.theme1{ background:#f0f9ff; color:#0c4a6e; }
.theme2{ background:#f0fdf4; color:#065f46; }
.theme3{ background:#faf5ff; color:#581c87; }
.theme4{ background:#fff7ed; color:#7c2d12; }

/* LOGIN MODAL */
#auth-container {
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

.auth-card { 
background: rgba(15, 23, 42, 0.95); 
padding: 40px; 
border-radius: 20px; 
box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
width: 100%; 
max-width: 380px; 
text-align: center; 
backdrop-filter: blur(15px); 
border: 1px solid #334155; 
}

.auth-card input { 
width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; 
border: 1px solid #334155; background: #0f172a; color: white; outline: none; 
}

.auth-card button { 
width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none; 
background: #38bdf8; color: #020617; font-weight: bold; cursor: pointer; 
}

/* HEADER */
.header{ 
position:fixed; top:0; width:100%; height:70px; 
background:rgba(2,6,23,0.85); 
backdrop-filter:blur(12px);
display:flex; align-items:center; padding:0 30px; 
justify-content: space-between; z-index: 100; 
}

/* BOTÓN LOGIN */
.login-btn{
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    box-shadow: 0 4px 12px rgba(56,189,248,0.4);
    transition: all 0.3s ease;
}
.login-btn:hover{
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 8px 20px rgba(56,189,248,0.6);
}
.login-btn:active{
    transform: scale(0.95);
}

/* LOGOUT */
#logoutBtn{
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
}

/* SIDEBAR */
.sidebar{ 
position:fixed; left:0; top:70px; width:180px; height:100%; 
background:rgba(2,6,23,0.95); padding:20px; 
}

.sidebar button{ 
width:100%; margin-bottom:12px; padding:12px; border:none; border-radius:10px; 
cursor:pointer; background: rgba(255,255,255,0.05); color: inherit; 
}

/* MAIN */
.main{ margin-top:90px; margin-left:200px; padding:20px; }

.section{display:none;}
.section.active{display:block;}

.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:25px; }

/* TARJETAS */
.card{ padding:20px; border-radius:20px; }

/* COLORES PASTEL POR SEMANA */
.card:nth-child(4n+1){ background:#e0f2fe; }
.card:nth-child(4n+2){ background:#dcfce7; }
.card:nth-child(4n+3){ background:#f3e8ff; }
.card:nth-child(4n+4){ background:#ffedd5; }

.admin-controls { display:none; }
body.is-admin .admin-controls { display:block; }

.delete-btn { display:none; }
body.is-admin .delete-btn { display:block; }

</style>
</head>

<body class="theme1">

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div id="auth-container">
<div class="auth-card">
<h2>Portafolio Digital</h2>
<input type="text" id="user-input" placeholder="Usuario">
<input type="password" id="pass-input" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<button onclick="closeLogin()">Cancelar</button>
</div>
</div>

<div id="main-content">

<div class="header">
<div>
HECTOR ALIAGA <span id="role-label"></span>
</div>

<div>
<button onclick="openLogin()" id="loginBtn" class="login-btn">🔐 Login</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">Cerrar Sesión</button>
</div>
</div>

<div class="sidebar">
<button onclick="setTab(1)">Unidad I</button>
<button onclick="setTab(2)">Unidad II</button>
<button onclick="setTab(3)">Unidad III</button>
<button onclick="setTab(4)">Unidad IV</button>
</div>

<div class="main">
<h2>ARQUITECTURA DE SOFTWARE</h2>
<div id="sections-wrapper"></div>
</div>

</div>

<script>
let userRole='user';

// RENDER
const wrapper=document.getElementById("sections-wrapper");

for(let u=1; u<=4; u++){
let html=`<div class="section ${u===1?'active':''}" id="sec-${u}">
<h2>Archivos Unidad ${u}</h2><div class="grid">`;

for(let s=1; s<=4; s++){
let folder=`U${u}_S${s}`;
html+=`<div class="card">
<h3>Semana ${s}</h3>
<div class="admin-controls">
<input type="file">
<button>Subir</button>
</div>
</div>`;
}
html+=`</div></div>`;
wrapper.innerHTML+=html;
}

// LOGIN
function openLogin(){document.getElementById('auth-container').style.display='flex';}
function closeLogin(){document.getElementById('auth-container').style.display='none';}

function login(){
let u=document.getElementById('user-input').value;
let p=document.getElementById('pass-input').value;

if(u==="Admin" && p==="A123"){
startApp('admin');
closeLogin();
}else alert("Credenciales incorrectas");
}

function startApp(role){
userRole=role;
document.getElementById('main-content').style.display='block';
document.getElementById('role-label').innerText=role;

if(role==='admin'){
document.body.classList.add('is-admin');
document.getElementById('loginBtn').style.display='none';
document.getElementById('logoutBtn').style.display='inline';
}
}

// LOGOUT
function logout(){location.reload();}

// NAV
function setTab(n){
document.body.className=`theme${n} ${userRole==='admin'?'is-admin':''}`;
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("sec-"+n).classList.add("active");
}

// AUTO INVITADO
startApp('user');
</script>

</body>
</html>
