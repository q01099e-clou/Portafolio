<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Académico - Hector Aliaga</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Tahoma;}
body{transition:0.4s;}

/* HEADER */
.header{
position:fixed;top:0;width:100%;height:70px;
display:flex;align-items:center;justify-content:space-between;
padding:0 30px;z-index:100;
}

/* BOTÓN ADMIN */
.admin-btn{
border:none;padding:8px 15px;
border-radius:8px;font-weight:bold;cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;left:0;top:70px;width:180px;height:100%;
padding:20px;
}

.sidebar button{
width:100%;margin-bottom:10px;padding:10px;
border:none;border-radius:10px;cursor:pointer;
}

/* MAIN */
.main{margin-left:200px;margin-top:90px;padding:20px;}

/* 🔥 TABS SEMANAS */
.tabs button{
margin:5px;
padding:10px 18px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

/* COLORES DE CADA TAB */
.tab1{background:#fde68a;}
.tab2{background:#86efac;}
.tab3{background:#a5b4fc;}
.tab4{background:#f9a8d4;}

/* TAB ACTIVO */
.tabs button.active{
transform:scale(1.1);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* CARD */
.card{
padding:25px;border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* ARCHIVOS */
.file-item{
display:flex;justify-content:space-between;
background:white;margin-top:10px;padding:10px;border-radius:10px;
}

/* ADMIN */
.delete-btn{
background:#ef4444;color:white;border:none;padding:5px 8px;border-radius:5px;cursor:pointer;
display:none;
}
body.is-admin .delete-btn{display:block;}

.admin-controls{display:none;}
body.is-admin .admin-controls{display:block;}

/* 🎨 FONDOS POR SEMANA */
.week1-bg{background:#fef9c3;}
.week2-bg{background:#dcfce7;}
.week3-bg{background:#e0e7ff;}
.week4-bg{background:#fce7f3;}

/* HEADER Y SIDEBAR DINÁMICOS */
.week1-bg .header,.week1-bg .sidebar{background:#fde68a;}
.week2-bg .header,.week2-bg .sidebar{background:#86efac;}
.week3-bg .header,.week3-bg .sidebar{background:#a5b4fc;}
.week4-bg .header,.week4-bg .sidebar{background:#f9a8d4;}

/* LOGIN */
#loginModal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;justify-content:center;align-items:center;
}

.login-box{
background:white;padding:30px;border-radius:20px;
width:320px;text-align:center;color:black;
}

.login-box input{
width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;
}

.login-box button{
width:100%;padding:10px;background:#38bdf8;border:none;border-radius:10px;
font-weight:bold;cursor:pointer;
}
</style>
</head>

<body class="week1-bg">

<div class="header">
<div>HECTOR ALIAGA</div>
<button class="admin-btn" onclick="openLogin()">Admin</button>
</div>

<div class="sidebar">
<button onclick="setUnit(1)">Unidad I</button>
<button onclick="setUnit(2)">Unidad II</button>
<button onclick="setUnit(3)">Unidad III</button>
<button onclick="setUnit(4)">Unidad IV</button>
</div>

<div class="main">
<h2>ARQUITECTURA DE SOFTWARE</h2>

<div class="tabs" id="tabs"></div>
<div id="content"></div>

</div>

<!-- LOGIN -->
<div id="loginModal">
<div class="login-box">
<h3>Ingreso Admin</h3>
<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<button onclick="closeLogin()" style="background:#ef4444; color:white; margin-top:10px;">
Cancelar
</div>
</div>

<script>

// CONFIG SUPABASE
const supabaseUrl = "https://fvneckjhfnugswlajjsf.supabase.co";
const supabaseKey = "sb_publishable_347CgxS4Qp61lnTRgFlh1g_iNTcBLSo";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let userRole="user";
let currentUnit=1;
let currentWeek=1;

// LOGIN
function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function login(){
const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

if(u==="Admin" && p==="A123"){
document.body.classList.add("is-admin");
userRole="admin";
alert("Modo administrador activado");
document.getElementById("loginModal").style.display="none";
}else{
alert("Datos incorrectos");
}
}
function closeLogin(){
    document.getElementById("loginModal").style.display="none";
}
window.onclick = function(e){
    const modal = document.getElementById("loginModal");
    if(e.target === modal){
        modal.style.display = "none";
    }
}
// UNIDAD
function setUnit(u){
currentUnit=u;
renderTabs();
renderContent();
}

// TABS
function renderTabs(){
let html="";
for(let s=1;s<=4;s++){
html+=`<button class="tab${s} ${s===currentWeek?'active':''}" onclick="setWeek(${s})">Semana ${s}</button>`;
}
document.getElementById("tabs").innerHTML=html;
}

// CAMBIAR SEMANA
function setWeek(s){
currentWeek=s;
document.body.className = `week${s}-bg ${userRole==="admin"?"is-admin":""}`;
renderTabs();
renderContent();
}

// CONTENIDO
function renderContent(){
let id=`U${currentUnit}_S${currentWeek}`;

document.getElementById("content").innerHTML=`
<div class="card">
<h3>Unidad ${currentUnit} - Semana ${currentWeek}</h3>

<div class="admin-controls">
<input type="file" id="fileInput">
<button onclick="upload('${id}')">Subir</button>
</div>

<div id="list"></div>
</div>
`;

load(id);
}

// SUBIR
async function upload(folder){
const file=document.getElementById("fileInput").files[0];
if(!file)return alert("Selecciona archivo");

const {error}=await supabaseClient.storage
.from("Archivos")
.upload(folder+"/"+Date.now()+"_"+file.name,file);

if(error) alert(error.message);
else{
alert("Subido correctamente");
load(folder);
}
}

// LISTAR
async function load(folder){
const {data}=await supabaseClient.storage.from("Archivos").list(folder);
const div=document.getElementById("list");
div.innerHTML="";

data?.forEach(item=>{
const {data:url}=supabaseClient.storage.from("Archivos")
.getPublicUrl(folder+"/"+item.name);

div.innerHTML+=`
<div class="file-item">
<a href="${url.publicUrl}" target="_blank">${item.name}</a>
<button class="delete-btn" onclick="removeFile('${folder}','${item.name}')">Eliminar</button>
</div>`;
});
}

// ELIMINAR
async function removeFile(folder,name){
if(!confirm("¿Eliminar archivo?")) return;

const {error}=await supabaseClient.storage
.from("Archivos")
.remove([folder+"/"+name]);

if(error) alert("Error al eliminar");
else{
alert("Eliminado");
load(folder);
}
}

// INIT
setUnit(1);

</script>

</body>
</html>
